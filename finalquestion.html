<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>最終問題</title>

  <link rel="stylesheet" href="css/quiz.css">
</head>

<body>

<canvas id="canvas"></canvas>

<div class="app">

  <a href="home.html" class="back-btn">ホームに戻る</a>

  <div class="message">
    古町に眠る<br>
    古マチピースを探せ！！
  </div>

  <h2 class="quiz-number">【最終問題】</h2>

  <!-- ===== 最終問題表示（改良版） ===== -->
<div class="quiz final-quiz">
  <h3 class="final-title">
    FINAL QUESTION
  </h3>
  <p class="final-sub">
    これまでのキーワードを繋ぎ、<br>
    “ひとつの場所”を導き出せ
  </p>

  <ul class="keyword-list">
    <li>眠る</li>
    <li>町</li>
    <li>西の堀</li>
    <li>地下</li>
  </ul>
</div>

  <!-- ===== 入力エリア ===== -->
  <div id="answerSection">

    <div class="answer-message">
      答えがわかったら<br>
      入力してね
    </div>

    <div class="answer-area">

      <input
        type="text"
        id="answer"
        placeholder="答えを入力"
      >

      <div class="buttons">
        <button class="send-btn" id="sendBtn">送信</button>
        <button class="reset-btn" id="resetBtn">取り消し</button>
      </div>

      <!-- 不正解メッセージ -->
      <p id="errorMessage" class="error"></p>

    </div>

  </div>

  <!-- ===== 正解表示（最初は非表示）===== -->
  

</div>

<script src="js/bg.js"></script>
<script src="js/finalquestion.js"></script>

</body>
</html>
